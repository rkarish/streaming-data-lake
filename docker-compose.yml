services:
  kafka:
    image: apache/kafka:3.8.1
    container_name: kafka
    hostname: kafka
    ports:
      - "29092:29092"
      - "39092:39092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092,PLAINTEXT_K8S://:39092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092,PLAINTEXT_K8S://host.docker.internal:39092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT_K8S:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    ports:
      - "8181:8181"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:sqlite:/tmp/iceberg_rest.db
      CATALOG_JDBC_USER: user
      CATALOG_JDBC_PASSWORD: password
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: true
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.8.0
    container_name: schema-registry
    ports:
      - "8085:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mock-data-gen:
    build: ./mock-data-gen
    profiles: ["generator"]
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    volumes:
      - ./schemas/avro:/app/schemas/avro:ro
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      EVENTS_PER_SECOND: 10
      TOPIC_BID_REQUESTS: bid-requests
      TOPIC_BID_RESPONSES: bid-responses
      TOPIC_IMPRESSIONS: impressions
      TOPIC_CLICKS: clicks
      BID_RESPONSE_RATE: 0.60
      WIN_RATE: 0.15
      CLICK_RATE: 0.05
      # Duplicate injection rates for dedup/idempotency testing
      DUPLICATE_BID_REQUEST_RATE: 0.00
      DUPLICATE_BID_RESPONSE_RATE: 0.00
      DUPLICATE_IMPRESSION_RATE: 0.00
      DUPLICATE_CLICK_RATE: 0.00
      # Traffic variation rates for testing stream transformations
      TEST_PUBLISHER_RATE: 0.05
      INVALID_IP_RATE: 0.02
      APP_TRAFFIC_RATE: 0.30
      NON_USD_CURRENCY_RATE: 0.10
      # Backfill mode - generate N hours of historical data at max speed
      # before switching to real-time. Set to 0 to disable.
      BACKFILL_HOURS: ${BACKFILL_HOURS:-0}
    restart: on-failure

  trino:
    image: trinodb/trino:467
    container_name: trino
    ports:
      - "8082:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
    depends_on:
      iceberg-rest:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "trino", "--execute", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver-workspace:/opt/cloudbeaver/workspace
      - ./cloudbeaver/initial-data-sources.conf:/opt/cloudbeaver/conf/initial-data-sources.conf
      - ./cloudbeaver/initial-data.conf:/opt/cloudbeaver/conf/initial-data.conf
    depends_on:
      trino:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8978"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  superset-postgres:
    image: postgres:16-alpine
    container_name: superset-postgres
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: superset
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  superset:
    build: ./superset
    container_name: superset
    ports:
      - "8088:8088"
      - "5678:5678"
    depends_on:
      superset-postgres:
        condition: service_healthy
      trino:
        condition: service_healthy
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py
      - ./superset/bootstrap.sh:/app/bootstrap.sh
      - ./superset/setup-dashboards.py:/app/setup-dashboards.py
    command: ["bash", "/app/bootstrap.sh"]
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8088"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  airflow-postgres:
    image: postgres:16-alpine
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  airflow:
    build: ./airflow
    container_name: airflow
    ports:
      - "8080:8080"
    depends_on:
      airflow-postgres:
        condition: service_healthy
      trino:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      _AIRFLOW_WWW_USER_PASSWORD: password
      AIRFLOW_CONN_TRINO_DEFAULT: '{"conn_type":"trino","host":"trino","port":8080,"login":"airflow","schema":"db","extra":{"catalog":"iceberg","protocol":"http"}}'
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/plugins:/opt/airflow/plugins:ro
      - ./trino/sql:/opt/airflow/trino_sql:ro
    command: airflow standalone
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  gitea:
    image: gitea/gitea:1.23
    container_name: gitea
    ports:
      - "3000:3000"
    volumes:
      - gitea-data:/data
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__ROOT_URL: http://localhost:3000
      GITEA__server__HTTP_PORT: "3000"
      GITEA__security__INSTALL_LOCK: "true"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/v1/settings/api"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  cloudbeaver-workspace:
  gitea-data:
