# Kubernetes Services that route docker-compose hostnames to the host machine.
# Flink pods resolve kafka, schema-registry, iceberg-rest, and minio as if
# they were on the same network as docker-compose, with port translation
# handled transparently by the Service.
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: flink
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  ports:
    - name: broker
      port: 9092
      targetPort: 39092
---
apiVersion: v1
kind: Service
metadata:
  name: schema-registry
  namespace: flink
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  ports:
    - name: http
      port: 8081
      targetPort: 8085
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-rest
  namespace: flink
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  ports:
    - name: http
      port: 8181
      targetPort: 8181
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: flink
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  ports:
    - name: api
      port: 9000
      targetPort: 9000
